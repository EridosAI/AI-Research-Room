# Test-only registry fixture (point RESEARCH_ROOM_CONFIG here). Keeps the real
# config.toml clean while exercising mock/api/cli paths with zero token cost.
research_judge = "mock"

[providers.mock]          # deterministic, in-process (no network)
auth_mode = "api"
backend   = "mock"
model     = "mock-1"
enabled   = true
color     = "#9aa3b2"

[providers.mock_cli]      # exercises the full CLI path via run_mock.sh
auth_mode       = "cli"
backend         = "cli"
runner          = "run_mock.sh"
converse_runner = "run_mock.sh"
model           = "mock-cli-1"
enabled         = true
color           = "#a3a3a3"

[providers.mockfail]      # always fails — for degradation tests
auth_mode       = "cli"
backend         = "cli"
runner          = "run_mockfail.sh"
converse_runner = "run_mockfail.sh"
model           = "mockfail-1"
enabled         = true
color           = "#aa5555"

[providers.mockslow]      # sleeps before answering — for the multi-room race test.
auth_mode       = "cli"   # disabled by default so it stays out of enabled() and
backend         = "cli"   # the other tests; the concurrency test adds it to a
runner          = "run_mockslow.sh"   # room's roster explicitly.
converse_runner = "run_mockslow.sh"
model           = "mockslow-1"
enabled         = false
color           = "#7c9cff"

[providers.mockthink]     # mock that emits reasoning (toggle on) — for Phase 11 tests.
auth_mode = "api"         # disabled by default so it stays out of enabled() and other
backend   = "mock"        # tests; the reasoning tests add it to a room's roster explicitly.
model     = "mockthink-1"
enabled   = false
reasoning = true
color     = "#fbcfe8"

[providers.mocksearch]    # mock that emits a web-search trace (toggle on) — for Phase 17 tests.
auth_mode  = "api"        # disabled by default so it stays out of enabled() and other
backend    = "mock"       # tests; the web-search tests add it to a room's roster explicitly.
model      = "mocksearch-1"
enabled    = false
web_search = true
color      = "#86efac"

[providers.or_test]       # OpenRouter-base row (Phase 20) — gives the effort selector its options.
auth_mode = "api"         # disabled by default; the model-bar test adds it to a room explicitly.
backend   = "openai"
base_url  = "https://openrouter.ai/api/v1"
model     = "z-ai/glm-5.2"
enabled   = false
reasoning = true
supported_efforts = ["high", "xhigh"]   # config override (ascending) — GLM-style, NOT the old trio
color     = "#fca5a5"

[providers.or_search]     # OpenRouter row with web search ON (Phase 23) — the no-search guard
auth_mode  = "api"        # must NOT fire for this seat. Disabled; the guard test stubs httpx.
backend    = "openai"
base_url   = "https://openrouter.ai/api/v1"
model      = "z-ai/glm-5.2"
enabled    = false
web_search = true
color      = "#86efac"

[providers.grok_proxy]    # Grok via the Hermes xAI-OAuth proxy (Phase 19) — openai-compatible,
auth_mode  = "api"        # localhost sidecar. Disabled by default; the phase-19 test stubs httpx.
backend    = "openai"
base_url   = "http://127.0.0.1:8645/v1"
model      = "grok-4.3"
enabled    = false
reasoning  = true
color      = "#c4b5fd"

[providers.deepseek]      # real provider for the live cheap call
auth_mode = "api"
backend   = "openai"
base_url  = "https://api.deepseek.com"
model     = "deepseek-v4-pro"
enabled   = true
color     = "#5eead4"

[providers.claude]        # real provider for the divergent-shape live call
auth_mode = "api"
backend   = "anthropic"
base_url  = "https://api.anthropic.com"
model     = "claude-opus-4-8"
enabled   = true
color     = "#d6a667"
